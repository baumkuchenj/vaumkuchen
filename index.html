<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title> BAUMKUCHEN </title>
    <meta
      name="description"
      content="趣味をまとめたポートフォリオ"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://platform.twitter.com" />
    <link rel="preconnect" href="https://syndication.twimg.com" crossorigin />
    <link rel="dns-prefetch" href="//platform.twitter.com" />
    <link rel="dns-prefetch" href="//syndication.twimg.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@500;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=20260319-2" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  </head>
  <body class="simple-layout">
    <div class="bg-glow" aria-hidden="true"></div>

    <header class="site-header">
      <div class="simple-hero">
        <h1 class="simple-title"> BAUMKUCHEN </h1>
        <div class="simple-icon" aria-hidden="true">
          <img
            src="profile-icon.png"
            alt="メインアイコン"
          />
        </div>
        <p class="simple-lead">
          趣味をまとめました。
          <br>
          マダミス / 謎解き / ボードゲーム など
          <br>
          誘うときの参考にしてください
        </p>
        <div class="simple-actions">
          <a class="hero-link hero-link-primary" href="https://x.com/_Vaumkuchen_" target="_blank" rel="noreferrer">
            <i class="fa-brands fa-x-twitter" aria-hidden="true"></i>
            <span>X</span>
          </a>
          <a class="hero-link" href="#puzzles">
            <i class="fa-solid fa-book" aria-hidden="true"></i>
            <span>通過した謎解き</span>
          </a>
          <a class="hero-link" href="#madamis">
            <i class="fa-solid fa-user-secret" aria-hidden="true"></i>
            <span>通過したマダミス</span>
          </a>
        </div>
      </div>
    </header>

    <main class="container">
    

      <section class="section" id="puzzles">
        <div class="section-head">
          <div>
            <h2>通過済謎解き・脱出ゲーム</h2>
          </div>          
        </div>
        <div class="section-search">
          <input
            type="search"
            id="puzzle-search"
            placeholder="検索（タイトル）"
            aria-label="謎解き一覧の検索"
          />
        </div>
        <div class="puzzle-scroller">
          <ul class="puzzle-list" id="puzzle-list"></ul>
        </div>
        <p class="section-status" id="puzzle-status"></p>
        <div class="section-actions">
          <button class="btn ghost" id="puzzle-prev">前へ</button>
          <span class="page-indicator" id="puzzle-page">1 / 1</span>
          <button class="btn primary" id="puzzle-next">次へ</button>
        </div>
      </section>

      <section class="section" id="madamis">
        <div class="section-head">
          <div>
            <h2>通過済マーダーミステリー</h2>
          </div>
        </div>
        <div class="section-search">
          <input
            type="search"
            id="madamis-search"
            placeholder="検索（タイトル）"
            aria-label="マダミス一覧の検索"
          />
        </div>
        <div class="madamis-scroller">
          <ul class="madamis-list" id="madamis-list"></ul>
        </div>
        <div class="section-actions">
          <button class="btn ghost" id="madamis-prev">前へ</button>
          <span class="page-indicator" id="madamis-page">1 / 1</span>
          <button class="btn primary" id="madamis-next">次へ</button>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>&copy; <span id="year"></span> Baumkuchen</p>
    </footer>

    <script src="./script.js?v=20260319-2"></script>
  </body>
</html>
